<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POND</title>
  <link rel="icon" href="favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #f4f1ec;
      font-family: "Times New Roman", Times, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10vh 8vw;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('images/hero.jpg') 30% center / cover no-repeat;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: normal;
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .sub {
      margin-top: 16px;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.35em;
      color: rgba(244,241,236,0.5);
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 48px;
      margin-top: 10vh;
    }

    nav a {
      text-decoration: none;
      color: #f4f1ec;
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(244,241,236,0.3);
      padding: 8px 0 4px;
      transition: border-color 0.3s;
    }

    nav a:hover {
      border-color: #f4f1ec;
    }

    @media (max-width: 480px) {
      body { padding: 8vh 6vw; }
      nav { gap: 12px 32px; margin-top: 8vh; }
    }

    footer {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: rgba(244,241,236,0.25);
    }
  </style>
</head>
<body>
  <div>
    <h1>POND</h1>
    <nav>
      <a href="youtube.html">YouTube</a>
      <a href="mixcloud.html">Mixcloud</a>
      <a href="instagram.html">Instagram</a>
      <a href="https://cratestokyo.stores.jp/" target="_blank" rel="noopener">Store</a>
</nav>
  </div>
  <footer>© POND</footer>
</body>
</html>
